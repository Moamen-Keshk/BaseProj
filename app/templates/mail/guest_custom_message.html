<p>Dear {{ first_name }} {{ last_name }},</p>
<p>{{ message_body }}</p>

  <h3 style="margin-top: 20px; margin-bottom: 5px;">Property Details</h3>
  <table style="width: 100%; max-width: 400px; border-collapse: collapse; margin-top: 5px;">
    <tr>
      <td style="padding: 8px; border-bottom: 1px solid #ddd;"><strong>Property:</strong></td>
      <td style="padding: 8px; border-bottom: 1px solid #ddd;">{{ property.name }}</td>
    </tr>
    <tr>
      <td style="padding: 8px; border-bottom: 1px solid #ddd;"><strong>Address:</strong></td>
      <td style="padding: 8px; border-bottom: 1px solid #ddd;">{{ property.address }}</td>
    </tr>
    <tr>
      <td style="padding: 8px; border-bottom: 1px solid #ddd;"><strong>Phone:</strong></td>
      <td style="padding: 8px; border-bottom: 1px solid #ddd;">{{ property.phone_number }}</td>
    </tr>
    <tr>
      <td style="padding: 8px; border-bottom: 1px solid #ddd;"><strong>Email:</strong></td>
      <td style="padding: 8px; border-bottom: 1px solid #ddd;">
        <a href="mailto:{{ property.email }}" style="color: #0056b3; text-decoration: none;">{{ property.email }}</a>
      </td>
    </tr>
  </table>

<p style="margin-top: 25px;">We look forward to hosting you!</p>
<p>Best regards,<br><strong>{{ property.name }} Management</strong></p>
